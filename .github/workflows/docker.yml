name: Docker

# Triggers:
#   push to main      → publishes ghcr.io/<owner>/<repo>:main (rolling)
#   tag v*            → publishes :X.Y.Z, :X.Y, :latest (semver)
#   pull_request      → build-only (no push), validates the Dockerfile
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
      - 'package*.json'
      - 'src/**'
      - 'migrations/**'

# Cancel superseded runs for the same ref so PRs don't queue up.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write       # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Login is only needed when we actually push (i.e. not on PRs).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives the tag list and OCI labels from the ref. Tags:
      #   main branch          → :main
      #   tag v1.2.3           → :1.2.3, :1.2, :latest
      #   PR                   → :pr-123 (only used when push=false below)
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Don't push on PRs — they may come from forks without packages:write.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GH cache stays scoped to the repo and survives across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
