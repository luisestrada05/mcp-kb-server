# Example deployment for the team. Copy to docker-compose.yml in the
# host where you'll run the centralized KB server.
#
# Flow:
#   1. Pull the image: `docker login ghcr.io -u <github_user> -p <PAT>`
#      where PAT has scope `read:packages`.
#   2. Populate ./data/kb.db (see README "Populating the volume").
#   3. `docker compose up -d`
#   4. Team's .mcp.json points to http://<host>:3001/mcp

services:
  kb-mcp:
    # Pin to :main for the rolling build, or to :1.2.3 once you cut a
    # versioned release. Avoid :latest in production — it makes rollbacks
    # ambiguous.
    image: ghcr.io/luisestrada05/mcp-kb-server:main

    container_name: kb-mcp

    restart: unless-stopped

    ports:
      - "3001:3001"

    environment:
      # KB_DB_PATH defaults to /data/kb.db in the image — only override
      # if you mount the volume somewhere else.
      KB_DB_PATH: /data/kb.db
      KB_PORT: 3001
      # Server is read-only by default. Set to "1" only if a curated
      # client is allowed to call kb_add_entity / kb_add_edge.
      KB_ALLOW_WRITES: "0"

    volumes:
      # The .db file lives outside the image so reingestion doesn't
      # require an image rebuild. Replace ./data with a named volume or
      # an absolute path in production.
      - ./data:/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
